<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #fff;
    color: #000;
    font-family: 'Malgun Gothic', '맑은 고딕', sans-serif;
    font-size: 15px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 48px 20px 80px;
  }

  .wrap {
    width: 100%;
    max-width: 640px;
  }
  @media (min-width: 900px) {
    .wrap { max-width: 1100px; }
    body { padding: 56px 48px 80px; }
  }

  @media (min-width: 900px) {
    .desktop-grid {
      display: grid;
      grid-template-columns: 1fr 320px;
      gap: 48px;
      align-items: start;
    }
    .sidebar { position: sticky; top: 48px; }
  }

  .progress-meta {
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    color: #888;
    margin-bottom: 6px;
  }
  .progress-track { height: 2px; background: #ddd; margin-bottom: 32px; }
  .progress-fill { height: 100%; background: #000; transition: width 0.3s ease; }

  .score-row { display: flex; gap: 16px; font-size: 13px; color: #888; margin-bottom: 40px; }
  .score-row b { color: #000; }

  @media (min-width: 900px) {
    .score-row { display: none; }
    .sidebar-score {
      background: #f8f8f8;
      border-radius: 8px;
      padding: 24px;
      margin-bottom: 24px;
    }
    .sidebar-score .item {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      color: #888;
      padding: 6px 0;
      border-bottom: 1px solid #eee;
    }
    .sidebar-score .item:last-child { border-bottom: none; }
    .sidebar-score .item b { color: #000; }
  }
  @media (max-width: 899px) {
    .sidebar { display: none; }
  }

  .q-number { font-size: 12px; color: #aaa; margin-bottom: 12px; }
  .q-text { font-size: 19px; line-height: 1.65; margin-bottom: 32px; font-weight: 500; }
  @media (min-width: 900px) {
    .q-text { font-size: 22px; }
  }

  .input-row { display: flex; gap: 8px; }
  .answer-input {
    flex: 1;
    border: 1px solid #ccc;
    border-radius: 4px;
    padding: 10px 14px;
    font-size: 15px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.15s;
  }
  @media (min-width: 900px) {
    .answer-input { padding: 13px 18px; font-size: 16px; }
  }
  .answer-input:focus { border-color: #000; }
  .answer-input:disabled { background: #f5f5f5; color: #999; }

  .btn {
    background: #000;
    color: #fff;
    border: none;
    border-radius: 4px;
    padding: 10px 20px;
    font-size: 14px;
    font-family: inherit;
    cursor: pointer;
  }
  .btn:disabled { background: #ccc; cursor: not-allowed; }

  .feedback { margin-top: 14px; font-size: 14px; line-height: 1.5; display: none; }
  .feedback.show { display: block; }
  .feedback.correct { color: #000; }
  .feedback.wrong { color: #888; }
  .feedback .correct-answer { margin-top: 4px; font-size: 13px; }

  .divider { border: none; border-top: 1px solid #eee; margin: 32px 0; }

  .nav-row { display: flex; justify-content: space-between; }
  .btn-nav {
    background: none;
    border: 1px solid #ddd;
    border-radius: 4px;
    padding: 8px 18px;
    font-size: 13px;
    font-family: inherit;
    cursor: pointer;
    color: #000;
  }
  .btn-nav:hover { border-color: #000; }
  .btn-nav:disabled { color: #ccc; border-color: #eee; cursor: not-allowed; }

  #result-screen { display: none; text-align: center; padding-top: 40px; }
  .result-score { font-size: 56px; font-weight: 700; letter-spacing: -2px; margin-bottom: 8px; }
  .result-sub { font-size: 14px; color: #888; margin-bottom: 40px; }
  .result-detail { display: flex; justify-content: center; gap: 40px; margin-bottom: 40px; }
  .result-detail .item { font-size: 13px; color: #888; }
  .result-detail .item b { display: block; font-size: 24px; color: #000; margin-bottom: 2px; }
  .result-btns { display: flex; gap: 12px; justify-content: center; }
  .btn-restart {
    background: #000; color: #fff; border: none; border-radius: 4px;
    padding: 12px 32px; font-size: 14px; font-family: inherit; cursor: pointer;
  }
  .btn-review {
    background: #fff; color: #000; border: 1px solid #000; border-radius: 4px;
    padding: 12px 32px; font-size: 14px; font-family: inherit; cursor: pointer;
  }

  .advance-bar {
    height: 2px;
    background: #000;
    width: 0%;
    margin-top: 10px;
    transition: none;
    border-radius: 2px;
  }

  @keyframes shake {
    0%,100%{transform:translateX(0)}
    25%{transform:translateX(-6px)}
    75%{transform:translateX(6px)}
  }
  .shake { animation: shake 0.25s ease; }

  #cover-screen {
    display: flex;
    flex-direction: column;
    justify-content: center;
    min-height: 60vh;
  }
  .cover-title {
    font-size: clamp(2.4rem, 8vw, 4rem);
    font-weight: 700;
    letter-spacing: -2px;
    margin-bottom: 20px;
    line-height: 1.1;
  }
  .cover-notice {
    font-size: 13px;
    color: #888;
    line-height: 1.8;
    margin-bottom: 40px;
    border-left: 2px solid #ddd;
    padding-left: 14px;
  }
  .btn-start {
    background: #000; color: #fff; border: none; border-radius: 4px;
    padding: 14px 40px; font-size: 15px; font-family: inherit; cursor: pointer;
    align-self: flex-start;
  }

  #review-screen { display: none; padding-top: 8px; }
  .review-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 32px;
  }
  .review-title { font-size: 20px; font-weight: 700; }
  .btn-back {
    background: none; border: 1px solid #ddd; border-radius: 4px;
    padding: 8px 18px; font-size: 13px; font-family: inherit; cursor: pointer; color: #000;
  }
  .btn-back:hover { border-color: #000; }
  .review-item {
    border-top: 1px solid #eee;
    padding: 20px 0;
  }
  .review-item:last-child { border-bottom: 1px solid #eee; }
  .review-q { font-size: 15px; line-height: 1.6; margin-bottom: 10px; font-weight: 500; }
  .review-meta { font-size: 13px; color: #888; display: flex; flex-direction: column; gap: 4px; }
  .review-meta .my-ans { color: #bbb; }
  .review-meta .right-ans { color: #000; font-weight: 600; }
  .review-qnum { font-size: 11px; color: #bbb; margin-bottom: 6px; }
  .no-wrong { color: #888; font-size: 14px; padding: 40px 0; text-align: center; }
</style>
</head>
<body>
<div class="wrap">

  <!-- 표지 -->
  <div id="cover-screen">
    <div class="cover-title">AI 프롬프트 프로그래밍</div>
    <div class="cover-notice">
      개인용<br>
      출제 예제
    </div>
    <button class="btn-start" onclick="startQuiz()">테스트 시작하기</button>
  </div>

  <!-- 퀴즈 본체 -->
  <div id="quiz-wrap" style="display:none;">
    <div class="progress-meta">
      <span id="prog-label">0 / 0</span>
      <span id="prog-pct">0%</span>
    </div>
    <div class="progress-track"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>

    <div class="score-row">
      <span>정답 <b id="sc-correct">0</b></span>
      <span>오답 <b id="sc-wrong">0</b></span>
      <span>남은 문제 <b id="sc-remain">0</b></span>
    </div>

    <div class="desktop-grid">
      <div>
        <div id="quiz-section">
          <div class="q-number" id="q-number">Q1</div>
          <div class="q-text" id="q-text"></div>
          <div class="input-row">
            <input class="answer-input" id="answer-input" type="text" placeholder="정답 입력" autocomplete="off" />
            <button class="btn" id="btn-submit">확인</button>
          </div>
          <div class="feedback" id="feedback"></div>
          <div class="advance-bar" id="advance-bar"></div>
          <hr class="divider">
          <div class="nav-row">
            <button class="btn-nav" id="btn-prev">← 이전</button>
            <button class="btn-nav" id="btn-next">다음 →</button>
          </div>
        </div>

        <!-- 결과 화면 -->
        <div id="result-screen">
          <div class="result-score" id="res-pct">0%</div>
          <div class="result-sub">모든 문제 완료</div>
          <div class="result-detail">
            <div class="item"><b id="res-correct">0</b>정답</div>
            <div class="item"><b id="res-wrong">0</b>오답</div>
          </div>
          <div class="result-btns">
            <button class="btn-restart" onclick="restart()">다시 풀기</button>
            <button class="btn-review" onclick="showReview()">오답 모아보기</button>
          </div>
        </div>

        <!-- 오답노트 화면 -->
        <div id="review-screen">
          <div class="review-header">
            <div class="review-title">오답노트</div>
            <button class="btn-back" onclick="backToResult()">← 결과로</button>
          </div>
          <div id="review-list"></div>
        </div>
      </div>

      <!-- 데스크톱 사이드바 -->
      <div class="sidebar">
        <div class="sidebar-score">
          <div class="item"><span>정답</span><b id="sd-correct">0</b></div>
          <div class="item"><span>오답</span><b id="sd-wrong">0</b></div>
          <div class="item"><span>남은 문제</span><b id="sd-remain">0</b></div>
          <div class="item"><span>진행률</span><b id="sd-pct">0%</b></div>
        </div>
      </div>
    </div>
  </div>

</div>
<script>
const QUESTIONS_RAW = [
  { q: "LLM의 작동원리 중, 통계적으로 높은 확률의 문맥 해석 메커니즘", a: ["어텐션" , "attention"]},
  { q: "LLM의 작동원리 중, 단어 간의 위치를 파악하는 통계적 메커니즘", a: ["워드 임베딩" ,  "word embedding"},
  { q: "의도한 대로 일관성있게 얻도록 설계하는 프롬프팅 과정", a: ["프롬프트 엔지니어링" , "프롬프트 프로그래밍"]},
  { q: "생성형 AI로부터 사용자가 원하는 결과물 도출을 위한 설계 과정", a: ["프롬프트 프로그래밍" , "프롬프트 엔지니어링"]},
  { q: "답변을 위해 필요한 배경 정보", a: "컨텍스트" },
  { q: "AI의 근본적 한계로, (  )로 작동하는 AI작동 방식", a: "확률"},
  { q: "생성형 AI의 구동 방식, (  ) -> 학습된 (  ) -> (  ) 파악", a: "지시문 데이터 관계"},
  { q: "대표적인 생성형 AI의 한계로 나타나는 환각 현상 (  )", a: ["할루시네이션" , "Hallucination"]},
  { q: "작업 및 목표 명시 구체화 방법, 여러 (  )로 나누어 제공하기" , a: "단계"},
  { q: "프롬프트 디자인 3요소 : (  ) 제공 / (  ) 명시 / (  ) 지정", a: ["컨텍스트 목표 형식" , "컨텍스트 작업 형식"]},
  { q: "명확한 지시문을 위해, (  )한 표현 피하기", a: ["모호" , "모호한"]},
  { q: "명확한 지시문을 위해, (  )하게 작성하기", a: ["상세" , "상세한"]},
  { q: "형식 및 구조지정의 효과, (  )가 명시 됨", a: "형태"},
  { q: "LLM의 작동 원리 중,  (  )을 통한 확률 조합", a: "토큰"},
  { q: "(  ) 기반 페르소나 프롬프팅, 페르소나에게 필요한 지식을 더 세밀하게 설정", a: "배경지식"},
  { q: "페르소나와 (  ) 명시, 사용자의 수준과 요청에 적합한 형태로 구현", a: "대상"},
  { q: "컨텍스트 통한 자동화된 그라운딩", a: "RAG"},
  { q: "프롬프팅으로 효과를 4가지 활용방법 (  ) 지시, (  ) 그라운딩, (  ) 명시, (  ) 기법", a: "직접 수동 출처 리액트"},
  { q: "'대화형(줄글)'에서 벗어나 명확한 '틀(양식)'에 맞춰 프롬프트를 작성하는 실무 기술", a: "프롬프트 구조"},
  { q: "명령어와 원본 데이터가 섞이지 않도록 벽을 쳐주는 기호", a: "구분"},
  { q: "[(  )]: AI가 수행해야 할 최상위 명령과 역할-> 페르소나 + 명", a: "지시"},
  { q: "[(  )]: AI가 참고해야 할 원본 데이터-> 배경지식", a: "입력"},
  { q: "[(  )]: 결과물이 담길 접시의 형태-> 제약조건 + 출력형식", a: "출력"},
  { q: "AI에게 스스로 생각하고 행동하도록 지시하는 고급 프롬프트 기법", a: "리액트"},
  { q: "제약조건의 예시, AI에게 절대 규칙 부여하기", a: "제약 조건"},
  { q: "제약조건의 정보의 성격이나 답변의 방향성을 통제하는 것", a: "특정 정책"},
  { q: "제약조건의 특정, 감정 등을 지정하여 원하는 어투를 설정하는 것", a: "규칙"},
  { q: "결과물의 물리적인 길이나 한계를 제한하는 것", a: "스타일 가이드"},
  { q: "AI에게 스스로 생각하고 행동하도록 지시하는 고급 프롬프트 기법", a: "리액트"},
  { q: "원하는 포맷을 엄격하게 지정하는 기술, (리스트/표/jason"), a: "결과물 형식 제어"},
  { q: "모델에게 특정 문제의 정답 예시(Fewshot)를 단 하나도 보여주지 않고 바로 문제를 던지는 상태", a: ["zero shot" , "제로 샷"]},
  { q: "AI가 자신의 사고 과정(생각의 사슬)을 전개하며 해답을 도출하게 만드는 기법", a: "CoT"},
  { q: "존나 나눠서 하는 거", a: "CoT"},
 
 
  
];

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

let QUESTIONS = [];
let current = 0;
let answered = [];    // 'correct' | 'wrong' | null
let userAnswers = []; // 사용자가 입력한 답 (문자열)
let advanceTimer = null;
let justSubmitted = false;
const ADVANCE_DELAY = 1000;

function startQuiz() {
  document.getElementById('cover-screen').style.display = 'none';
  document.getElementById('quiz-wrap').style.display = 'block';
  init();
}

function init() {
  QUESTIONS = shuffle(QUESTIONS_RAW);
  answered = Array(QUESTIONS.length).fill(null);
  userAnswers = Array(QUESTIONS.length).fill('');
  current = 0;
  justSubmitted = false;
  render();
}

function normalize(str) {
  return str.replace(/\s+/g, '').toLowerCase();
}

function isCorrect(input, answer) {
 
 if (Array.isArray(answer)) {
  
  return answer.some(a => normalize(input) === normalize(a));
  
  }
   return normalize(input) === normalize(answer);
 
 }

function updateScores() {
  const total = QUESTIONS.length;
  const done = answered.filter(x => x !== null).length;
  const pct = Math.round(done / total * 100);
  const correct = answered.filter(x => x === 'correct').length;
  const wrong   = answered.filter(x => x === 'wrong').length;

  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('prog-label').textContent = `${done} / ${total}`;
  document.getElementById('prog-pct').textContent = pct + '%';

  document.getElementById('sc-correct').textContent = correct;
  document.getElementById('sc-wrong').textContent   = wrong;
  document.getElementById('sc-remain').textContent  = total - done;

  document.getElementById('sd-correct').textContent = correct;
  document.getElementById('sd-wrong').textContent   = wrong;
  document.getElementById('sd-remain').textContent  = total - done;
  document.getElementById('sd-pct').textContent     = pct + '%';
}

function render() {
  if (advanceTimer) { clearTimeout(advanceTimer); advanceTimer = null; }

  const total = QUESTIONS.length;
  const q = QUESTIONS[current];
  const state = answered[current];

  updateScores();

  document.getElementById('q-number').textContent = `Q${current + 1} / ${total}`;
  document.getElementById('q-text').textContent = q.q;

  const input  = document.getElementById('answer-input');
  const btnSub = document.getElementById('btn-submit');
  const fb     = document.getElementById('feedback');
  const bar    = document.getElementById('advance-bar');

  bar.style.transition = 'none';
  bar.style.width = '0%';

  if (state === null) {
    input.value = '';
    input.disabled = false;
    btnSub.disabled = false;
    fb.className = 'feedback';
    fb.innerHTML = '';
    input.focus();
  } else if (state === 'correct') {
    input.value = Array.isArray(q.a) ? q.a[0] : q.a;
    input.disabled = true;
    btnSub.disabled = true;
    fb.className = 'feedback correct show';
    fb.innerHTML = '✓ 정답';
    if (justSubmitted) scheduleAdvance(bar);
  } else {
    input.value = userAnswers[current];
    input.disabled = true;
    btnSub.disabled = true;
    fb.className = 'feedback wrong show';
    const answerText = Array.isArray(q.a) ? q.a.join(' / ') : q.a;
    fb.innerHTML = `✗ 오답<div class="correct-answer">정답: ${answerText}</div>`;
    if (justSubmitted) scheduleAdvance(bar);
  }

  justSubmitted = false;

  document.getElementById('btn-prev').disabled = current === 0;
  document.getElementById('btn-next').disabled = current === total - 1;
}

function scheduleAdvance(bar) {
  requestAnimationFrame(() => {
    bar.style.transition = `width ${ADVANCE_DELAY}ms linear`;
    bar.style.width = '100%';
  });

  advanceTimer = setTimeout(() => {
    if (answered.every(x => x !== null)) {
      showResult();
    } else if (current < QUESTIONS.length - 1) {
      current++;
      justSubmitted = false;
      render();
    }
  }, ADVANCE_DELAY);
}

function submit() {
  const val = document.getElementById('answer-input').value.trim();
  if (!val) return;

  const result = isCorrect(val, QUESTIONS[current].a) ? 'correct' : 'wrong';
  answered[current] = result;
  userAnswers[current] = val;

  if (result === 'wrong') {
    const sec = document.getElementById('quiz-section');
    sec.classList.remove('shake');
    void sec.offsetWidth;
    sec.classList.add('shake');
  }

  justSubmitted = true;
  render();
}

function showResult() {
  document.getElementById('quiz-section').style.display = 'none';
  document.getElementById('result-screen').style.display = 'block';
  document.getElementById('review-screen').style.display = 'none';

  const correct = answered.filter(x => x === 'correct').length;
  const wrong   = answered.filter(x => x === 'wrong').length;
  document.getElementById('res-correct').textContent = correct;
  document.getElementById('res-wrong').textContent   = wrong;
  document.getElementById('res-pct').textContent = Math.round(correct / QUESTIONS.length * 100) + '%';
}

function restart() {
  document.getElementById('quiz-section').style.display = '';
  document.getElementById('result-screen').style.display = 'none';
  document.getElementById('review-screen').style.display = 'none';
  init();
}

function showReview() {
  document.getElementById('result-screen').style.display = 'none';
  document.getElementById('review-screen').style.display = 'block';

  const wrongList = QUESTIONS
    .map((q, i) => ({ q, i }))
    .filter(x => answered[x.i] === 'wrong');

  const list = document.getElementById('review-list');
  if (wrongList.length === 0) {
    list.innerHTML = '<div class="no-wrong">틀린 문제가 없습니다 야호</div>';
    return;
  }

  list.innerHTML = wrongList.map((x, idx) => `
    <div class="review-item">
      <div class="review-qnum">오답 ${idx + 1}</div>
      <div class="review-q">${x.q.q}</div>
      <div class="review-meta">
        <span class="my-ans">내 답: ${userAnswers[x.i]}</span>
        <span class="right-ans">정답: ${Array.isArray(x.q.a) ? x.q.a.join(' / ') : x.q.a}</span>
      </div>
    </div>
  `).join('');
}

function backToResult() {
  document.getElementById('review-screen').style.display = 'none';
  document.getElementById('result-screen').style.display = 'block';
}

document.getElementById('btn-submit').addEventListener('click', submit);
document.getElementById('answer-input').addEventListener('keydown', e => { if (e.key === 'Enter') submit(); });
document.getElementById('btn-prev').addEventListener('click', () => {
  if (advanceTimer) { clearTimeout(advanceTimer); advanceTimer = null; }
  justSubmitted = false;
  if (current > 0) { current--; render(); }
});
document.getElementById('btn-next').addEventListener('click', () => {
  if (advanceTimer) { clearTimeout(advanceTimer); advanceTimer = null; }
  justSubmitted = false;
  if (current < QUESTIONS.length - 1) { current++; render(); }
});
</script>
</body>
</html>
