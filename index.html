<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz System</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #fff;
    color: #000;
    font-family: 'Malgun Gothic', '맑은 고딕', sans-serif;
    font-size: 15px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 48px 20px 80px;
  }
  .wrap { width: 100%; max-width: 640px; }
  @media (min-width: 900px) {
    .wrap { max-width: 1100px; }
    body { padding: 56px 48px 80px; }
    .desktop-grid { display: grid; grid-template-columns: 1fr 320px; gap: 48px; align-items: start; }
    .sidebar { position: sticky; top: 48px; }
  }
  .progress-meta { display: flex; justify-content: space-between; font-size: 13px; color: #888; margin-bottom: 6px; }
  .progress-track { height: 2px; background: #ddd; margin-bottom: 32px; }
  .progress-fill { height: 100%; background: #000; transition: width 0.3s ease; }
  .score-row { display: flex; gap: 16px; font-size: 13px; color: #888; margin-bottom: 40px; }
  .score-row b { color: #000; }
  .sidebar-score { background: #f8f8f8; border-radius: 8px; padding: 24px; margin-bottom: 24px; }
  .sidebar-score .item { display: flex; justify-content: space-between; font-size: 13px; color: #888; padding: 6px 0; border-bottom: 1px solid #eee; }
  .sidebar-score .item:last-child { border-bottom: none; }
  .sidebar-score .item b { color: #000; }
  @media (max-width: 899px) { .sidebar { display: none; } }
  .q-number { font-size: 12px; color: #aaa; margin-bottom: 12px; }
  .q-text { font-size: 19px; line-height: 1.65; margin-bottom: 32px; font-weight: 500; }
  .input-row { display: flex; gap: 8px; }
  .answer-input { flex: 1; border: 1px solid #ccc; border-radius: 4px; padding: 10px 14px; font-size: 15px; outline: none; }
  .answer-input:focus { border-color: #000; }
  .btn { background: #000; color: #fff; border: none; border-radius: 4px; padding: 10px 20px; cursor: pointer; }
  .feedback { margin-top: 14px; font-size: 14px; line-height: 1.5; display: none; }
  .feedback.show { display: block; }
  .feedback.correct { color: #000; }
  .feedback.wrong { color: #888; }
  .advance-bar { height: 2px; background: #000; width: 0%; margin-top: 10px; }
  .nav-row { display: flex; justify-content: space-between; margin-top: 20px; }
  .btn-nav { background: none; border: 1px solid #ddd; border-radius: 4px; padding: 8px 18px; cursor: pointer; }
  #cover-screen { text-align: center; padding-top: 100px; }
  .cover-title { font-size: 40px; font-weight: 700; margin-bottom: 20px; }
  .btn-start { background: #000; color: #fff; border: none; padding: 14px 40px; border-radius: 4px; cursor: pointer; }
  #result-screen, #review-screen { display: none; text-align: center; }
  .shake { animation: shake 0.25s ease; }
  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }
</style>
</head>
<body>
<div class="wrap">
  <div id="cover-screen">
    <div class="cover-title">문제 은행</div>
    <button class="btn-start" onclick="startQuiz()">테스트 시작하기</button>
  </div>

  <div id="quiz-wrap" style="display:none;">
    <div class="progress-meta"><span id="prog-label">0 / 0</span><span id="prog-pct">0%</span></div>
    <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
    <div class="desktop-grid">
      <div>
        <div id="quiz-section">
          <div class="q-number" id="q-number">Q1</div>
          <div class="q-text" id="q-text"></div>
          <div class="input-row">
            <input class="answer-input" id="answer-input" type="text" placeholder="정답 입력" autocomplete="off" />
            <button class="btn" id="btn-submit" onclick="submit()">확인</button>
          </div>
          <div class="feedback" id="feedback"></div>
          <div class="advance-bar" id="advance-bar"></div>
          <div class="nav-row">
            <button class="btn-nav" id="btn-prev" onclick="prevQ()">← 이전</button>
            <button class="btn-nav" id="btn-next" onclick="nextQ()">다음 →</button>
          </div>
        </div>

        <div id="result-screen">
          <div style="font-size:50px; font-weight:bold;" id="res-pct">0%</div>
          <div class="result-btns" style="margin-top:20px; display:flex; gap:10px; justify-content:center;">
            <button class="btn" onclick="restart()">다시 풀기</button>
            <button class="btn" style="background:#666;" onclick="showReview()">오답 확인</button>
          </div>
        </div>

        <div id="review-screen">
          <h2 style="margin-bottom:20px;">오답노트</h2>
          <div id="review-list"></div>
          <button class="btn" style="margin-top:20px;" onclick="backToResult()">결과로 돌아가기</button>
        </div>
      </div>

      <div class="sidebar">
        <div class="sidebar-score">
          <div class="item"><span>정답</span><b id="sd-correct">0</b></div>
          <div class="item"><span>오답</span><b id="sd-wrong">0</b></div>
          <div class="item"><span>진행률</span><b id="sd-pct">0%</b></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const QUESTIONS_RAW = [
  { q: "기계어에 가까운 프로그래밍 언어를 (    )라 부른다.", a: "저급언어"},
  { q: "기계어를 사람이 읽을 수 있는 문자 형태로 바꿔놓은 프로그래밍 언어는 (    )이다", a: "어셈블리어"},
  { q: "소스 코드를 컴퓨터가 실행할 수 있는 기계어로 번역하여 실행 파일을 만든 후 한꺼번에 실행하는 형태를 (    ) 방식이라 부른다.", a: "컴파일"},
  { q: "소스 코드를 한 번에 한 행씩 실행하는 것을 (    ) 방식이라 부른다.", a: "인터프리터"},
  { q: "(    ) 방식의 장점은 실행 전에 소스 코드의 오류를 발견하고 최적화된 코드를 만들 수 있다는 것이다.", a: "컴파일"},
  { q: "(    )은 서로 다른 운영체제에서도 동일한 작업환경을 만들어 준다.", a: "가상머신"},
  { q: "자바를 사용하기 위해 설치하는 가상머신을 (JVM)이라 부른다.", a: "JVM"},
  { q: "컴퓨터가 이해할 수 있는 언어로 숫자로만 이루어진 언어를 (    )라 부른다.", a: "기계어"},
  { q: "변수와 함수를 하나로 묶어서 편리하게 처리하는 언어를 (    ) 언어라 부른다.", a: "객체지향"},
  { q: "소스 코드에서 오류를 수정하는 작업을 (    )이라 부른다.", a: "디버깅"},
  { q: "문법에 맞지 않는 코드로 인하여 발생하는 오류를 (    )라 부른다.", a: "문법오류"},
  { q: "컴파일했는데 실행 파일이 작동하지 않는 오류를 (    )라 부른다.", a: "실행 시간 오류"},
  { q: "소스 코드에 문법적인 오류는 없지만 원하는 결과가 나오지 않는 오류를 (    )라 부른다.", a: "논리 오류"},
  { q: "웹 시스템은 (    ) 구조로 되어 있다.", a: ["클라이언트 서버" , "클라이언트-서버"]},
  { q: "죽지 않고 계속 살아있는 소프트웨어를 (    )이라 부른다.", a: "데몬"},
  { q: "특정 위치에 링크를 걸어 다른 문서와 연결하는 기능을 (    )라 부른다.", a: "하이퍼텍스트"},
  { q: "태그를 사용하여 데이터가 가지는 속성을 표기하는 언어를 (    ) 언어라 부른다.", a: "마크업"},
  { q: "웹 데몬과 응용 프로그램을 연결하여 인터페이스로 작동하는 소프트웨어를 (    )라 부른다.", a: "CGI"},
  { q: "아파치 웹 데몬이 제공하는 스크립트를 (    )라 부른다.", a: "PHP"},
  { q: "웹 데몬의 종류와 상관없이 사용할 수 있는 스크립트가 (    )이다.", a: "JSP"},
  { q: "반정형 데이터를 구성하는 마크업 언어가 (    )이다.", a: "XML"},
  { q: "전 세계에서 문서 표준처럼 자리 잡은 어도비의 문서 포맷은 (    )이다.", a: "PDF"},
  { q: "데이터의 의미나 속성을 규정하는 데이터를 (    )라 부른다.", a: "메타데이터"},
  { q: "HTML의 한계를 극복하여 멀티미디어 재생을 지원하는 마크업 언어가 (    )이다.", a: "HTML5"},
  { q: "웹 페이지의 3대 구성 요소 중 책의 본문에 해당하는 것은 (    )이다.", a: "HTML"},
  { q: "웹 페이지의 3대 구성 요소 중 문서의 출력 모양을 결정하는 것은 (    )이다.", a: "CSS"},
  { q: "웹 페이지의 3대 구성 요소 중 문서에서 동적으로 변하는 부분을 만드는 언어는 (    )이다", a: "자바스크립트"},
  { q: "HTML 태그 중 문단을 구분하는 태그는 < >이다.", a: "p"},
  { q: "HTML 태그 중 글자를 굵게 표시하는 태그는 < >이다.", a: "B"},
  { q: "HTML 태그 중 줄바꿈하는 태그는 < >이다.", a: "BR"},
  { q: "HTML 태그 중 수평선을 표시하는 태그는 < >이다.", a: "HR"},
  { q: "<FONT> 태그 옵션 중에서 폰트 종류를 지정하는 옵션은 (    )이다.", a: "face"}
];

let QUESTIONS = [];
let current = 0;
let answered = [];
let userAnswers = [];
let advanceTimer = null;

function shuffle(arr) {
  return arr.sort(() => Math.random() - 0.5);
}

function startQuiz() {
  document.getElementById('cover-screen').style.display = 'none';
  document.getElementById('quiz-wrap').style.display = 'block';
  QUESTIONS = shuffle([...QUESTIONS_RAW]);
  answered = Array(QUESTIONS.length).fill(null);
  userAnswers = Array(QUESTIONS.length).fill('');
  current = 0;
  render();
}

function normalize(str) {
  return str.toString().replace(/\s+/g, '').toLowerCase();
}

function render() {
  const q = QUESTIONS[current];
  document.getElementById('q-number').textContent = `Q${current + 1} / ${QUESTIONS.length}`;
  document.getElementById('q-text').textContent = q.q;
  
  const input = document.getElementById('answer-input');
  const fb = document.getElementById('feedback');
  
  input.value = userAnswers[current];
  input.disabled = answered[current] !== null;
  fb.style.display = answered[current] === null ? 'none' : 'block';
  
  if(answered[current] === 'correct') {
    fb.className = 'feedback correct show';
    fb.textContent = '✓ 정답입니다.';
  } else if(answered[current] === 'wrong') {
    fb.className = 'feedback wrong show';
    fb.textContent = `✗ 오답 (정답: ${Array.isArray(q.a) ? q.a[0] : q.a})`;
  }

  updateProgress();
}

function submit() {
  if (answered[current] !== null) return;
  const val = document.getElementById('answer-input').value.trim();
  if (!val) return;

  const correctAns = QUESTIONS[current].a;
  const isRight = Array.isArray(correctAns) 
    ? correctAns.some(a => normalize(val) === normalize(a))
    : normalize(val) === normalize(correctAns);

  answered[current] = isRight ? 'correct' : 'wrong';
  userAnswers[current] = val;
  
  if (!isRight) {
    document.getElementById('quiz-section').classList.add('shake');
    setTimeout(() => document.getElementById('quiz-section').classList.remove('shake'), 300);
  }
  
  render();
  
  if (answered.every(x => x !== null)) {
    setTimeout(showResult, 1000);
  }
}

function updateProgress() {
  const done = answered.filter(x => x !== null).length;
  const pct = Math.round((done / QUESTIONS.length) * 100);
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('prog-pct').textContent = pct + '%';
  document.getElementById('sd-pct').textContent = pct + '%';
  document.getElementById('sd-correct').textContent = answered.filter(x => x === 'correct').length;
  document.getElementById('sd-wrong').textContent = answered.filter(x => x === 'wrong').length;
}

function prevQ() { if (current > 0) { current--; render(); } }
function nextQ() { if (current < QUESTIONS.length - 1) { current++; render(); } }

function showResult() {
  document.getElementById('quiz-section').style.display = 'none';
  document.getElementById('result-screen').style.display = 'block';
  const correct = answered.filter(x => x === 'correct').length;
  document.getElementById('res-pct').textContent = Math.round((correct / QUESTIONS.length) * 100) + '%';
}

function restart() { location.reload(); }

function showReview() {
  document.getElementById('result-screen').style.display = 'none';
  document.getElementById('review-screen').style.display = 'block';
  const list = document.getElementById('review-list');
  list.innerHTML = QUESTIONS.map((q, i) => {
    if (answered[i] === 'wrong') {
      return `<div style="text-align:left; margin-bottom:15px; border-bottom:1px solid #eee; padding-bottom:10px;">
        <p><b>Q. ${q.q}</b></p>
        <p style="color:red;">내 답: ${userAnswers[i]}</p>
        <p style="color:green;">정답: ${Array.isArray(q.a) ? q.a.join(', ') : q.a}</p>
      </div>`;
    }
    return '';
  }).join('');
}

function backToResult() {
  document.getElementById('review-screen').style.display = 'none';
  document.getElementById('result-screen').style.display = 'block';
}
</script>
</body>
</html>
